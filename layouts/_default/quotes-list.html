{{ define "main" }}

<main class="quotes-page">
  <header>
    <h1>{{ .Title }}</h1>
    {{ with .Content }}
      <div>{{ . }}</div>
    {{ end }}
  </header>

  {{ $quotes := sort site.Data.quotes.quotes "author" "asc" }}

  <p><small>{{ len $quotes }} quotes</small></p>

  <section class="quotes-list">
    {{ range $quotes }}
      <article class="quote-item">
        <blockquote>{{ .text }}</blockquote>
        <p class="quote-author">- {{ .author }}</p>
      </article>
    {{ end }}
  </section>
</main>

<style>
.quotes-page .quotes-list {
  margin-top: 1.5rem;
}

.quotes-page .quote-item {
  border: 1px solid #000;
  padding: 0.8rem 1rem;
  margin-bottom: 0.75rem;
}

.quotes-page blockquote {
  margin: 0;
}

.quotes-page .quote-author {
  margin: 0.6rem 0 0;
  font-size: 0.95rem;
  font-style: italic;
}
</style>

{{ end }}
