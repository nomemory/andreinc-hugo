<script>
document.addEventListener("DOMContentLoaded", () => {
  const root = document.querySelector(".alb-page");
  if (!root) return;

  const items = root.querySelectorAll(".alb-item");
  const params = new URLSearchParams(window.location.search);

  function normalize(v) {
    return (v || "").trim().toLowerCase();
  }

  function applyFilters(genre) {
    const wantedGenre = normalize(genre);

    items.forEach((item) => {
      const itemGenres = (item.dataset.genres || "")
        .split(",")
        .map(normalize)
        .filter(Boolean);

      const genreOk = !wantedGenre || itemGenres.includes(wantedGenre);
      item.style.display = genreOk ? "" : "none";
    });
  }

  const currentGenre = normalize(params.get("genre"));
  applyFilters(currentGenre);

  root.querySelectorAll("a").forEach((link) => {
    try {
      const url = new URL(link.href, window.location.origin);
      const linkGenre = normalize(url.searchParams.get("genre"));
      const isAll = url.pathname === window.location.pathname && !url.search;

      if (!currentGenre && isAll) {
        link.classList.add("alb-active-filter");
      }

      if (currentGenre && linkGenre === currentGenre) {
        link.classList.add("alb-active-filter");
      }
    } catch (e) {}
  });

  const randomBtn = root.querySelector("#alb-random-entry");
  if (randomBtn) {
    randomBtn.addEventListener("click", () => {
      const visibleItems = Array.from(items).filter(
        (item) => item.style.display !== "none"
      );

      if (!visibleItems.length) return;

      const randomItem =
        visibleItems[Math.floor(Math.random() * visibleItems.length)];

      randomItem.scrollIntoView({
        behavior: "smooth",
        block: "center"
      });
    });
  }
});

document.addEventListener("DOMContentLoaded", () => {
  const root = document.querySelector(".alb-page");
  if (!root) return;

  root.querySelectorAll(".alb-preview-toggle").forEach((btn) => {
    btn.addEventListener("click", () => {
      const wrap = btn.closest(".alb-preview-wrap");
      if (!wrap) return;

      const embed = wrap.querySelector(".alb-embed");
      if (!embed) return;

      const isHidden = embed.hasAttribute("hidden");

      if (isHidden) {
        embed.removeAttribute("hidden");
        btn.setAttribute("aria-expanded", "true");
        btn.textContent = "Hide preview";
      } else {
        embed.setAttribute("hidden", "");
        btn.setAttribute("aria-expanded", "false");
        btn.textContent = "Preview";
      }
    });
  });
});
