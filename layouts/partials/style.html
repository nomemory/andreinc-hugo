<style>
  :root {
    --width: 720px;
    --font-main: Verdana, sans-serif;
    --font-secondary: Verdana, sans-serif;
    --font-scale: 1em;
    --background-color: #fff;
    --heading-color: #222;
    --text-color: #444;
    --link-color: #3273dc;
    --visited-color: #8b6fcb;
    --blockquote-color: #222;
  }

  @media (prefers-color-scheme: dark) {
    :root {
      --background-color: #01242e;
      --heading-color: #eee;
      --text-color: #ddd;
      --link-color: #8cc2dd;
      --visited-color: #8b6fcb;
      --blockquote-color: #ccc;
    }
  }

  body {
    font-family: var(--font-secondary);
    font-size: var(--font-scale);
    margin: auto;
    padding: 20px;
    max-width: var(--width);
    text-align: left;
    background-color: #F6F8FA; /* override */
    word-wrap: break-word;
    overflow-wrap: break-word;
    line-height: 1.5;
    color: #222222; /* override */
  }

  h1,
  h2,
  h3,
  h4,
  h5,
  h6 {
    font-family: var(--font-main);
    color: var(--heading-color);
  }

  h1, h2, h3, h4, h5, h6 {
    color: #111111; /* override */
  }

  a {
    color: #0056b3; /* override */
    cursor: pointer;
    text-decoration: none;
  }

  a:hover {
    color: #003d80; /* override */
    text-decoration: underline;
  }

  nav a {
    margin-right: 8px;
  }

  strong,
  b {
    color: var(--heading-color);
  }

  strong {
    color: #222222; /* override */
  }

  button {
    margin: 0;
    cursor: pointer;
  }

  time {
    font-family: monospace;
    font-style: normal;
    font-size: 15px;
  }

  main {
    line-height: 1.6;
  }

  hr {
    border: none; /* override */
    border-top: 1px solid #e5e5e5; /* override */
  }

  img {
    max-width: 100%;
  }

  code {
    font-family: monospace;
    padding: 2px;
    border-radius: 3px;
  }

  blockquote {
    border-left: 4px solid #0056b3; /* override */
    color: #444444; /* override */
    padding-left: 1rem; /* override */
    font-style: italic;
    background: #fafafa; /* override */
  }

  footer {
    padding: 25px 0;
    text-align: center;
  }

  .title:hover {
    text-decoration: none;
  }

  .title h1 {
    font-size: 1.5em;
  }

  .inline {
    width: auto !important;
  }

  .highlight,
  .code {
    border-radius: 3px;
    margin-block-start: 1em;
    margin-block-end: 1em;
    overflow-x: auto;
  }

  /* blog post list */
  ul.blog-posts {
    list-style-type: none;
    padding: unset;
  }

  ul.blog-posts li {
    display: flex;
  }

  ul.blog-posts li span {
    flex: 0 0 130px;
  }

  ul.blog-posts li a:visited {
    color: var(--visited-color);
  }

  .mp {
    border: thin solid #ccc;
    background-color: #F0F0F0;
    padding: 25px;
    width: inherit;
    box-sizing: border-box;
    white-space: normal;
    overflow-wrap: break-word;
    word-wrap: break-word;
    overflow-x: auto;
    overflow-y: visible;
  }

  .mpl {
    position: relative;
    font: 0.7rem/1.1 sans-serif; /* small font */
    font-style: italic;
    text-decoration: none;       /* looks like plain text */
    background: #F0F0F0;
    border-radius: 1px;
    border: 0px solid #ccd;
  }

  .mpt {
    padding: 25px;
    font-style: italic;
    color: #666;
  }

  .mpc {
    text-align: center;
  }

  .mpn {
    display: inline-block;
    font-weight: normal;
    font-size: 0.8rem;
    color: #777;
  }

  .meta, .post-meta {
    color: #555555;
  }

  pre {
    background-color: #f5f5f5;
    border: 1px solid #e5e5e5;
    padding: 1rem;
    overflow-x: auto;
  }

  /* --- Clean thin tables (BearBlog-friendly) --- */
  table {
    width: 100%;
    border-collapse: collapse; /* override */
    margin: 1.5rem 0;          /* override */
    font-size: 0.95rem;        /* override */
  }

  thead th {
    text-align: left;
    font-weight: 600;
    padding: 0.5rem 0.75rem;
    border-bottom: 2px solid #ddd;
  }

  tbody td {
    padding: 0.45rem 0.75rem;
    border-bottom: 1px solid #eee;
    vertical-align: top;
  }

  tbody tr:last-child td {
    border-bottom: 0;
  }

  /* Subtle row hover */
  tbody tr:hover {
    background: #fafafa;
  }

  /* Inline code inside tables */
  table code {
    background: #f3f3f3;
    padding: 0.1em 0.35em;
    border-radius: 4px;
    font-size: 0.9em;
  }

  /* --- Global Navigation --- */
  .site-header {
    margin-bottom: 1.5rem;
  }

  .global-nav {
    display: flex;
    flex-wrap: wrap;
    gap: 1rem;
    border-bottom: 1px solid #e5e5e5; /* Matches your hr and pre borders */
  }

  .global-nav a {
    font-weight: 550;
    color: #222222;
    font-size: 1.05rem;
    transition: color 0.5s ease;
  }

  .global-nav a:hover {
    color: #0056b3; /* Your custom link hover color */
    text-decoration: underline;
  }

  /* Optional: Highlight the active page link (if supported by your URL structure) */
  .global-nav a.active {
    color: #0056b3;
  }
</style>
