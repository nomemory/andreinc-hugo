<style>
  :root {
    --width: 720px;
    --font-main: Verdana, sans-serif;
    --font-secondary: Verdana, sans-serif;
    --font-scale: 1em;
    --background-color: #F6F8FA;
    --heading-color: #111111;
    --text-color: #222222;
    --link-color: #0056b3;
    --link-hover: #003d80;
    --visited-color: #8b6fcb;
    --blockquote-color: #444444;
    --blockquote-bg: #fafafa;
    --border-color: #e5e5e5;
    --mp-bg: #F0F0F0;
    --meta-color: #555555;
  }

  body {
    font-family: var(--font-secondary);
    font-size: var(--font-scale);
    margin: auto;
    padding: 20px;
    max-width: var(--width);
    text-align: left;
    background-color: var(--background-color);
    word-wrap: break-word;
    overflow-wrap: break-word;
    line-height: 1.5;
    color: var(--text-color);
  }

  h1, h2, h3, h4, h5, h6 {
    font-family: var(--font-main);
    color: var(--heading-color);
  }

  a {
    color: var(--link-color);
    cursor: pointer;
    text-decoration: none;
  }

  a:hover {
    color: var(--link-hover);
    text-decoration: underline;
  }

  nav a {
    margin-right: 8px;
  }

  strong, b {
    color: var(--text-color);
  }

  button {
    margin: 0;
    cursor: pointer;
  }

  time {
    font-family: monospace;
    font-style: normal;
    font-size: 15px;
  }

  main {
    line-height: 1.6;
  }

  hr {
    border: none;
    border-top: 1px solid var(--border-color);
  }

  img {
    max-width: 100%;
  }

  code {
    font-family: monospace;
    padding: 2px;
    border-radius: 3px;
  }

  blockquote {
    border-left: 4px solid var(--link-color);
    color: var(--blockquote-color);
    padding-left: 1rem;
    font-style: italic;
    background: var(--blockquote-bg);
  }

  footer {
    padding: 25px 0;
    text-align: center;
  }

  .title:hover {
    text-decoration: none;
  }

  .title h1 {
    font-size: 1.5em;
  }

  .inline {
    width: auto !important;
  }

  .highlight, .code {
    border-radius: 3px;
    margin-block-start: 1em;
    margin-block-end: 1em;
    overflow-x: auto;
  }

  /* blog post list */
  ul.blog-posts {
    list-style-type: none;
    padding: unset;
  }

  ul.blog-posts li {
    display: flex;
  }

  ul.blog-posts li span {
    flex: 0 0 130px;
  }

  ul.blog-posts li a:visited {
    color: var(--visited-color);
  }

  /* Problem Boxes */
  .mp {
    border: thin solid #ccc;
    background-color: var(--mp-bg);
    padding: 25px;
    width: inherit;
    box-sizing: border-box;
    white-space: normal;
    overflow-wrap: break-word;
    word-wrap: break-word;
    overflow-x: auto;
    overflow-y: visible;
  }

  .mpl {
    position: relative;
    font: 0.7rem/1.1 sans-serif;
    font-style: italic;
    text-decoration: none;
    background: var(--mp-bg);
    border-radius: 1px;
    border: 0px solid #ccd;
  }

  .mpt {
    padding: 25px;
    font-style: italic;
    color: #666;
  }

  .mpc {
    text-align: center;
  }

  .mpn {
    display: inline-block;
    font-weight: normal;
    font-size: 0.8rem;
    color: #777;
  }

  .meta, .post-meta {
    color: var(--meta-color);
  }

  pre {
    background-color: #f5f5f5;
    border: 1px solid var(--border-color);
    padding: 1rem;
    overflow-x: auto;
  }

  /* Tables */
  table {
    width: 100%;
    border-collapse: collapse;
    margin: 1.5rem 0;
    font-size: 0.95rem;
  }

  thead th {
    text-align: left;
    font-weight: 600;
    padding: 0.5rem 0.75rem;
    border-bottom: 2px solid #ddd;
  }

  tbody td {
    padding: 0.45rem 0.75rem;
    border-bottom: 1px solid #eee;
    vertical-align: top;
  }

  tbody tr:last-child td {
    border-bottom: 0;
  }

  tbody tr:hover {
    background: var(--blockquote-bg);
  }

  table code {
    background: #f3f3f3;
    padding: 0.1em 0.35em;
    border-radius: 4px;
    font-size: 0.9em;
  }

  /* Navigation */
  .global-nav {
    display: flex;
    flex-wrap: wrap;
    gap: 1rem;
    border-bottom: 1px solid var(--border-color);
  }

  .global-nav a {
    font-weight: 550;
    color: var(--text-color);
    font-size: 1.05rem;
    transition: color 0.5s ease;
  }

  .global-nav a:hover, .global-nav a.active {
    color: var(--link-color);
    text-decoration: underline;
  }

  /* FAQ & About */
  .about-faq {
    max-width: 800px;
    margin: 2rem 0;
    font-family: inherit;
  }
  .about-faq dt {
    font-weight: 700;
    color: var(--heading-color);
    margin-top: 1.5rem;
    font-size: 1.1rem;
  }
  .about-faq dd {
    margin-left: 0;
    margin-top: 0.5rem;
    padding-left: 1rem;
    border-left: 3px solid #eee;
    color: var(--text-muted);
    font-style: italic;
  }

  /* Tagline & Tooltips */
  .site-tagline {
    text-align: left;
    font-family: monospace;
    font-size: 11px;
    color: #888888;
    margin-top: 8px;
    padding-right: 10px;
  }

  .tagline-text {
    cursor: help;
    border-bottom: 1px dotted transparent;
    transition: border-bottom-color 0.2s ease;
    position: relative;
    display: inline-block;
  }

  .tagline-text:hover {
    border-bottom-color: #888888;
  }

  .tagline-text::after {
    content: attr(data-tooltip);
    position: absolute;
    bottom: -28px;
    right: 0;
    background-color: #111111;
    color: #FFFFFF;
    padding: 4px 8px;
    border-radius: 4px;
    white-space: nowrap;
    font-size: 10px;
    opacity: 0;
    visibility: hidden;
    transition: opacity 0.2s ease, visibility 0.2s ease;
    z-index: 100;
    pointer-events: none;
  }

  .tagline-text:hover::after,
  .tagline-text.active-tooltip::after {
    opacity: 1;
    visibility: visible;
  }
</style>
