    const selectedPhrase = phrases[randomIndex];

    const taglineElement = document.getElementById("random-tagline");
    
    if (taglineElement) {
        // Inject the text with the data-tooltip attribute
        taglineElement.innerHTML = `Personal site of Andrei N. Ciobanu: <span class="tagline-text" data-tooltip="${selectedPhrase.en}">${selectedPhrase.ro}</span>`;
        
        const textSpan = taglineElement.querySelector('.tagline-text');
        
        // Toggle the tooltip visibility on click
        textSpan.addEventListener('click', (event) => {
            event.stopPropagation(); // Prevents the click from bubbling up
            textSpan.classList.toggle('active-tooltip');
        });

        // Hide the tooltip if the user clicks anywhere else on the page
        document.addEventListener('click', () => {
            textSpan.classList.remove('active-tooltip');
        });
    }
});
